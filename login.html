<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MiTécnica · Ingresá a tu cuenta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#1a3a6b; --navy-dark:#122c54; --navy-faint:#eef2f9;
  --red:#e63946; --border:#dde1e7; --bg:#f0f2f5;
  --text:#1e2d40; --muted:#6b7280; --white:#ffffff;
  --font:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:var(--bg);font-family:var(--font);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;padding-top:60px;}
/* Top bar estilo SAEP */
.top-bar{position:fixed;top:0;left:0;right:0;height:52px;background:var(--navy);display:flex;align-items:center;padding:0 1.5rem;gap:.85rem;}
.logo-badge{width:28px;height:28px;background:linear-gradient(135deg,var(--red),#ff6b35);border-radius:4px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:.78rem;flex-shrink:0;}
.brand-name{color:#fff;font-size:.95rem;font-weight:700;line-height:1.2;}
.brand-sub{color:rgba(255,255,255,.5);font-size:.65rem;}
/* Card central */
.box{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:2rem 2.25rem;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(26,58,107,.08);animation:up .3s ease both;}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.box-header{text-align:center;margin-bottom:1.5rem;}
.box-logo{width:44px;height:44px;background:var(--navy);border-radius:6px;display:flex;align-items:center;justify-content:center;margin:0 auto .9rem;font-weight:700;color:#fff;font-size:1.1rem;}
.box-title{font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:.2rem;}
.box-sub{font-size:.75rem;color:var(--muted);}
/* Form */
.form-group{margin-bottom:.9rem;}
.form-label{display:block;font-size:.62rem;font-weight:600;color:var(--muted);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.05em;}
.form-input{width:100%;padding:.52rem .7rem;border:1px solid var(--border);border-radius:4px;font-family:var(--font);font-size:.85rem;color:var(--text);background:var(--bg);transition:border-color .12s,background .12s;outline:none;}
.form-input:focus{border-color:var(--navy);background:#fff;}
.form-input::placeholder{color:#b0bdd4;}
.password-wrap{position:relative;}
.toggle-pass{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:2px;transition:color .12s;}
.toggle-pass:hover{color:var(--navy);}
/* Role selector */
.role-group{margin-bottom:1rem;}
.role-selector{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:.35rem;}
.role-btn{border:1px solid var(--border);border-radius:4px;padding:.6rem .5rem;cursor:pointer;background:var(--bg);transition:all .12s;text-align:center;}
.role-btn-icon{font-size:17px;display:block;margin-bottom:3px;}
.role-btn-label{font-size:.62rem;font-weight:600;color:var(--muted);display:block;text-transform:uppercase;letter-spacing:.04em;}
.role-btn.sel{border-color:var(--navy);background:var(--navy-faint);}
.role-btn.sel .role-btn-label{color:var(--navy);}
.role-btn:hover:not(.sel){border-color:#b0bedc;}
/* Button */
.btn-login{width:100%;padding:.6rem;background:var(--navy);color:#fff;font-family:var(--font);font-size:.82rem;font-weight:600;border:none;border-radius:4px;cursor:pointer;transition:background .12s;margin-top:.25rem;}
.btn-login:hover{background:var(--navy-dark);}
/* Error */
.login-error{background:rgba(230,57,70,.08);border:1px solid rgba(230,57,70,.3);border-radius:4px;padding:.5rem .75rem;font-size:.75rem;color:var(--red);font-weight:600;margin-bottom:.75rem;display:none;}
.login-error.show{display:block;}
/* Demo hint */
.demo-hint{margin-top:1.1rem;padding:.75rem .9rem;background:var(--bg);border:1px solid var(--border);border-radius:4px;font-size:.72rem;color:var(--muted);}
.demo-hint strong{color:var(--navy);display:block;margin-bottom:.35rem;font-size:.62rem;text-transform:uppercase;letter-spacing:.05em;}
.demo-user{display:flex;justify-content:space-between;align-items:center;padding:2px 0;}
.demo-user span:last-child{background:var(--white);border:1px solid var(--border);border-radius:3px;padding:1px 7px;font-size:.65rem;color:var(--navy);cursor:pointer;font-weight:600;}
.demo-user span:last-child:hover{background:var(--navy-faint);}
@media(max-width:480px){.box{padding:1.5rem 1.25rem;border-radius:8px;}}
</style>
</head>
<body>
<div class="top-bar">
  <div class="logo-badge">E1</div>
  <div>
    <div class="brand-name">Gestión de Laboratorios</div>
    <div class="brand-sub">EEST N°1 · Sistema MiTécnica</div>
  </div>
</div>

<div class="box">
  <div class="box-header">
    <div class="box-logo">🔬</div>
    <div class="box-title">Ingresá a tu cuenta</div>
    <div class="box-sub">Gestión de Laboratorios Informáticos</div>
  </div>
  <div class="login-error" id="login-error">Usuario o contraseña incorrectos.</div>
  <div class="form-group">
    <label class="form-label">Usuario</label>
    <input class="form-input" type="text" id="f-usuario" placeholder="Ej: ces.roberto" autocomplete="username" spellcheck="false">
  </div>
  <div class="form-group">
    <label class="form-label">Contraseña</label>
    <div class="password-wrap">
      <input class="form-input" type="password" id="f-pass" placeholder="••••••••" autocomplete="current-password">
      <button class="toggle-pass" type="button" onclick="togglePass()">👁</button>
    </div>
  </div>
  <div class="role-group">
    <label class="form-label">Entrás como…</label>
    <div class="role-selector">
      <label class="role-btn sel" id="role-prof" onclick="selRole('prof')">
        <span class="role-btn-icon">👤</span>
        <span class="role-btn-label">Docente</span>
      </label>
      <label class="role-btn" id="role-admin" onclick="selRole('admin')">
        <span class="role-btn-icon">🔑</span>
        <span class="role-btn-label">Directivo</span>
      </label>
    </div>
  </div>
  <button class="btn-login" onclick="doLogin()">Ingresar →</button>
  <div class="demo-hint">
    <strong>Accesos de demostración</strong>
    <div class="demo-user"><span>🧑‍🏫 ces.roberto (docente)</span><span onclick="fillDemo('ces.roberto','ces123','prof')">usar</span></div>
    <div class="demo-user"><span>👩‍🏫 dimartino.claudia</span><span onclick="fillDemo('dimartino.claudia','dim123','prof')">usar</span></div>
    <div class="demo-user"><span>🔑 admin (directivo)</span><span onclick="fillDemo('admin','admin123','admin')">usar</span></div>
  </div>
</div>

<script>
// ── Clave canónica de sesión (debe coincidir exactamente con app.js) ──
var SESSION_KEY = 'SAEP_session_data';

var USERS = {
  'ces.roberto':       { pass:'ces123',   role:'prof',  id:1, display:'Prof. Ces'        },
  'dimartino.claudia': { pass:'dim123',   role:'prof',  id:2, display:'Prof. Di Martino' },
  'pieroni.marcelo':   { pass:'pie123',   role:'prof',  id:3, display:'Prof. Pieroni'    },
  'reichert.sandra':   { pass:'rei123',   role:'prof',  id:4, display:'Prof. Reichert'   },
  'arnaiz.gustavo':    { pass:'arn123',   role:'prof',  id:5, display:'Prof. Arnaiz'     },
  'admin':             { pass:'admin123', role:'admin', id:0, display:'Administrador'    },
};

var selectedRole = 'prof';

function selRole(r) {
  selectedRole = r;
  document.getElementById('role-prof').classList.toggle('sel', r === 'prof');
  document.getElementById('role-admin').classList.toggle('sel', r === 'admin');
}

function togglePass() {
  var f = document.getElementById('f-pass');
  f.type = (f.type === 'password') ? 'text' : 'password';
}

function fillDemo(u, p, r) {
  document.getElementById('f-usuario').value = u;
  document.getElementById('f-pass').value    = p;
  selRole(r);
}

function doLogin() {
  var username = document.getElementById('f-usuario').value.trim().toLowerCase();
  var password = document.getElementById('f-pass').value;
  var errEl    = document.getElementById('login-error');

  // Ocultar error previo antes de validar
  errEl.classList.remove('show');

  var found = USERS[username];

  // Validación estricta: usuario existe + contraseña correcta + rol coincide
  if (!found || found.pass !== password || found.role !== selectedRole) {
    errEl.classList.add('show');
    return;
  }

  // Construir payload con campos explícitos y tipados
  var sessionPayload = {
    user:    username,
    role:    found.role,
    id:      found.id,
    display: found.display
  };

  try {
    // Guardar bajo clave canónica estricta
    sessionStorage.setItem(SESSION_KEY, JSON.stringify(sessionPayload));
  } catch (e) {
    // sessionStorage lleno o bloqueado — no redirigir
    errEl.textContent = 'No se pudo iniciar sesión. Verificá los permisos del navegador.';
    errEl.classList.add('show');
    return;
  }

  // replace() en lugar de href: elimina login.html del historial
  // → el botón "Atrás" del navegador no regresa al formulario
  window.location.replace('index.html');
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

// Auto-redirect si ya existe una sesión válida: misma clave canónica
(function checkExistingSession() {
  try {
    var raw = sessionStorage.getItem(SESSION_KEY);
    if (!raw) return;
    var parsed = JSON.parse(raw);
    // Solo redirigir si el payload tiene los campos mínimos esperados
    if (parsed && parsed.role && parsed.display) {
      window.location.replace('index.html');
    }
  } catch (e) {
    // JSON corrupto: limpiar silenciosamente y permanecer en login
    sessionStorage.removeItem(SESSION_KEY);
  }
})();
</script>
</body>
</html>
